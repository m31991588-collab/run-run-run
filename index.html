<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Mein Jump 'n' Run</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #222;
        }
        canvas {
            background-color: #FFB347; 
            border: 2px solid white;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="1024" height="576"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // --- BILDER LADEN ---
    // Hier sagen wir dem Spiel, dass es dein Bild laden soll
    const bgImage = new Image();
    bgImage.src = 'hintergrund.jpg'; // ACHTUNG: Der Name muss exakt mit deiner Bilddatei übereinstimmen!

    let score = 187650;
    let coins = 245;
    let lives = 3;

    // Unsere Spielfigur (Aktuell noch ein blaues Quadrat)
    let player = {
        x: 400,
        y: 100,
        width: 40,
        height: 60,
        color: '#0088FF',
        velocityY: 0,
        gravity: 0.5,
        isGrounded: false
    };

    // Ein unsichtbarer Boden, platziert auf Höhe der Ranken im Bild
    let platform = {
        x: 0,            // Startet ganz links
        y: 480,          // Die Höhe im Bild, wo ungefähr der Boden ist
        width: 1024,     // Geht über die ganze Breite
        height: 100,
        color: 'rgba(0, 255, 0, 0.3)' // Halbtransparentes Grün, damit wir sehen, wo unsere unsichtbare Wand ist!
    };

    function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. ZUERST DAS BILD ZEICHNEN (Der Hintergrund)
        // Wir zeichnen das Bild über die gesamte Spielfläche
        ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);

        // 2. PHYSIK BERECHNEN
        player.velocityY += player.gravity;
        player.y += player.velocityY;

        if (player.y + player.height >= platform.y && 
            player.x + player.width >= platform.x && 
            player.x <= platform.x + platform.width) {
            
            player.y = platform.y - player.height;
            player.velocityY = 0;
            player.isGrounded = true;
        }

        // 3. LOGIK ZEICHNEN (Diese zeichnen wir ÜBER das Bild)
        
        // Den halbtransparenten Boden zeichnen (später machen wir den komplett unsichtbar)
        ctx.fillStyle = platform.color;
        ctx.fillRect(platform.x, platform.y, platform.width, platform.height);

        // Den Spieler zeichnen
        ctx.fillStyle = player.color;
        ctx.fillRect(player.x, player.y, player.width, player.height);

        // Das HUD zeichnen (Weiße Schrift mit schwarzem Rand, damit man es auf dem Bild besser lesen kann)
        ctx.fillStyle = "white";
        ctx.strokeStyle = "black";
        ctx.lineWidth = 3;
        ctx.font = "bold 24px Arial";
        
        // Text umranden und dann füllen
        ctx.strokeText("Leben: " + lives, 20, 40);
        ctx.fillText("Leben: " + lives, 20, 40);
        
        ctx.strokeText("SCORE: " + score, canvas.width - 250, 40);
        ctx.fillText("SCORE: " + score, canvas.width - 250, 40);

        requestAnimationFrame(update);
    }

    // Wir starten das Spiel erst, wenn das Bild auch wirklich fertig geladen ist
    bgImage.onload = function() {
        update();
    };

</script>

</body>
</html>
