<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Nebula Stars: Ultra</title>
    <style>
        :root { 
            --gold: #ffcc00; --gold-dark: #b38f00;
            --blue-bright: #0081ff; --blue-dark: #0041aa;
            --ui-bg: rgba(2, 12, 27, 0.8);
        }
        body { 
            margin: 0; background: #01050a; color: white; 
            font-family: 'Arial Black', sans-serif; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        #gameContainer { 
            position: relative; width: 850px; height: 480px; 
            background: linear-gradient(180deg, #1a3a6c 0%, #050e1f 100%);
            border: 6px solid #2a4a7c; border-radius: 45px; overflow: hidden;
            box-shadow: 0 0 100px rgba(0,0,0,0.9), inset 0 0 50px rgba(0,129,255,0.2);
        }

        canvas { display: block; width: 100%; height: 100%; }

        /* --- BRAWL STYLE UI --- */
        .ui-layer { position: absolute; inset: 0; z-index: 10; pointer-events: none; }
        .pointer { pointer-events: all; }

        .top-nav { position: absolute; top: 20px; width: 100%; display: flex; justify-content: center; gap: 20px; }
        .pill { 
            background: var(--ui-bg); padding: 8px 25px; border-radius: 30px; 
            border: 3px solid #fff; box-shadow: 0 4px 0 rgba(0,0,0,0.3);
            display: flex; align-items: center; gap: 10px; font-size: 1.1rem;
        }

        .play-btn { 
            position: absolute; right: 40px; bottom: 40px; 
            width: 250px; height: 90px; background: linear-gradient(180deg, var(--gold) 0%, var(--gold-dark) 100%); 
            border: 6px solid #fff; border-radius: 30px; box-shadow: 0 12px 0 #664400;
            color: #000; font-size: 2.5rem; cursor: pointer; display: flex; 
            align-items: center; justify-content: center; transform: rotate(-2deg);
            text-shadow: 0 2px 0 rgba(255,255,255,0.5);
        }
        .play-btn:active { transform: rotate(-2deg) translateY(8px); box-shadow: 0 4px 0 #664400; }

        .side-menu { position: absolute; left: 30px; top: 110px; display: flex; flex-direction: column; gap: 20px; }
        .tile { 
            width: 90px; height: 90px; background: linear-gradient(180deg, var(--blue-bright) 0%, var(--blue-dark) 100%);
            border: 4px solid #fff; border-radius: 22px; box-shadow: 0 8px 0 #002d7a;
            display: flex; align-items: center; justify-content: center; font-size: 2.8rem; cursor: pointer;
        }

        /* --- IN-GAME CONTROLS --- */
        .game-controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 50px; box-sizing: border-box; }
        .ctrl-btn { 
            width: 100px; height: 100px; background: rgba(255,255,255,0.1); backdrop-filter: blur(15px);
            border: 4px solid rgba(255,255,255,0.5); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 3rem; pointer-events: all;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="lobbyUI" class="ui-layer pointer">
        <div class="top-nav">
            <div class="pill" style="color: var(--gold); border-color: var(--gold);">💰 <span id="goldText">0</span></div>
            <div class="pill" style="color: #00ff88; border-color: #00ff88;">🏆 <span id="scoreText">0</span></div>
        </div>
        <div class="side-menu">
            <div class="tile">🛒</div>
            <div class="tile" style="background: linear-gradient(180deg, #ff4646 0%, #aa0000 100%); border-color: #fff; box-shadow: 0 8px 0 #660000;">👕</div>
        </div>
        <div class="play-btn" onclick="startGame()">LOS!</div>
    </div>

    <div id="gameUI" class="ui-layer hidden">
        <div class="game-controls">
            <div style="display: flex; gap: 25px;">
                <div class="ctrl-btn" id="btnJump">↑</div>
                <div class="ctrl-btn" id="btnDuck" style="border-color: #ff4646; color: #ff4646;">↓</div>
            </div>
            <div class="ctrl-btn" id="btnDash" style="border-color: #00fbff; color: #00fbff;">⚡</div>
        </div>
    </div>

    <canvas id="canvas" width="850" height="480"></canvas>
</div>

<script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    let game = { active: false, frame: 0, speed: 7, particles: [] };
    let player = { x: 150, y: 310, w: 65, h: 95, vy: 0, jumps: 0, duck: false, dash: 0 };
    let env = { platforms: [], enemies: [] };

    function drawHero(x, y, isLobby) {
        ctx.save();
        let breathe = isLobby ? Math.sin(Date.now() * 0.003) * 6 : 0;
        let py = player.duck ? y + 40 : y - breathe;
        let ph = player.duck ? 55 : 95;

        // Shadow
        ctx.fillStyle = "rgba(0,0,0,0.4)";
        ctx.beginPath(); ctx.ellipse(x+32, 415, 30, 8, 0, 0, Math.PI*2); ctx.fill();

        // Body Outline
        ctx.strokeStyle = "#001a33"; ctx.lineWidth = 8;
        ctx.beginPath(); ctx.roundRect(x-2, py-2, 69, ph+4, 18); ctx.stroke();

        // Main Body (Gradient)
        let grad = ctx.createLinearGradient(x, py, x, py+ph);
        grad.addColorStop(0, "#00a2ff"); grad.addColorStop(1, "#0051ff");
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.roundRect(x, py, 65, ph, 16); ctx.fill();

        // Vest/Detail
        ctx.fillStyle = "rgba(255,255,255,0.15)";
        ctx.fillRect(x+10, py+40, 45, 20);

        // Face
        ctx.fillStyle = "#ffdbac";
        ctx.beginPath(); ctx.roundRect(x+5, py-5, 55, 50, 18); ctx.fill();
        
        // Eyes (High Detail)
        ctx.fillStyle = "#fff";
        ctx.beginPath(); ctx.arc(x+20, py+15, 9, 0, Math.PI*2); ctx.arc(x+45, py+15, 9, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#000";
        ctx.beginPath(); ctx.arc(x+23, py+15, 4, 0, Math.PI*2); ctx.arc(x+42, py+15, 4, 0, Math.PI*2); ctx.fill();

        // Shine Effect
        ctx.fillStyle = "rgba(255,255,255,0.3)";
        ctx.beginPath(); ctx.roundRect(x+5, py+5, 15, 5, 5); ctx.fill();

        ctx.restore();
    }

    function drawPlatform(p) {
        // 3D Side
        ctx.fillStyle = "#1a3a6c";
        ctx.fillRect(p.x, p.y + 15, p.w, p.h);
        // Top Surface
        let grad = ctx.createLinearGradient(p.x, p.y, p.x, p.y+20);
        grad.addColorStop(0, "#4a90ff"); grad.addColorStop(1, "#2a4a7c");
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.roundRect(p.x, p.y, p.w, 20, 5); ctx.fill();
        // Highlight Edge
        ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.lineWidth = 2;
        ctx.strokeRect(p.x+2, p.y+2, p.w-4, 2);
    }

    function startGame() {
        document.getElementById("lobbyUI").classList.add("hidden");
        document.getElementById("gameUI").classList.remove("hidden");
        game.active = true; game.frame = 0;
        env.platforms = [{x: 0, y: 410, w: 2000, h: 200}];
        env.enemies = [];
        loop();
    }

    // --- CONTROLS ---
    const doJump = () => { if(player.jumps < 2) { player.vy = -19; player.jumps++; } };
    document.getElementById("btnJump").ontouchstart = (e) => { e.preventDefault(); doJump(); };
    document.getElementById("btnDuck").ontouchstart = (e) => { e.preventDefault(); player.duck = true; };
    document.getElementById("btnDuck").ontouchend = (e) => { e.preventDefault(); player.duck = false; };
    document.getElementById("btnDash").ontouchstart = (e) => { e.preventDefault(); if(player.dash <= 0) player.dash = 18; };

    window.onkeydown = (e) => { 
        if(e.code === "Space") doJump(); 
        if(e.code === "ArrowDown") player.duck = true;
    };
    window.onkeyup = (e) => { if(e.code === "ArrowDown") player.duck = false; };

    function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if(!game.active) {
            drawHero(400, 230, true);
            requestAnimationFrame(loop);
            return;
        }

        game.frame++;
        let speed = player.dash > 0 ? 20 : game.speed;
        
        // Physics
        if(player.dash > 0) { player.dash--; player.vy = 0; }
        else { player.vy += 0.95; player.y += player.vy; }

        if(player.y > 315) { 
            player.y = 315; player.vy = 0; player.jumps = 0; 
            if(game.frame % 5 === 0) game.particles.push({x: player.x, y: 410, r: 5, a: 1}); // Dust
        }

        // Platforms
        env.platforms.forEach(p => {
            p.x -= speed;
            drawPlatform(p);
        });

        // Enemies (Brawl Style Spikes)
        if(game.frame % 80 === 0) env.enemies.push({x: 900, y: 370});
        env.enemies.forEach((en, i) => {
            en.x -= speed;
            ctx.fillStyle = "#ff4646";
            ctx.beginPath(); ctx.moveTo(en.x, en.y+40); ctx.lineTo(en.x+20, en.y); ctx.lineTo(en.x+40, en.y+40); ctx.fill();
            ctx.strokeStyle = "#fff"; ctx.stroke();
            if(Math.abs(player.x - en.x) < 45 && Math.abs(player.y - en.y) < 45) {
                if(player.dash > 0) env.enemies.splice(i, 1);
                else { game.active = false; location.reload(); }
            }
        });

        // VFX Particles
        game.particles.forEach((p, i) => {
            p.x -= speed; p.a -= 0.05;
            ctx.fillStyle = `rgba(255,255,255,${p.a})`;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
            if(p.a <= 0) game.particles.splice(i, 1);
        });

        drawHero(player.x, player.y, false);
        document.getElementById("goldText").innerText = Math.floor(game.frame/5);
        document.getElementById("scoreText").innerText = Math.floor(game.frame/20);
        
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
