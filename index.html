<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Nebula Stars</title>
    <style>
        :root { 
            --blue: #0081ff; --yellow: #ffca00; --red: #ff4646; 
            --green: #2ecc71; --dark: #0b132b; --white: #ffffff;
        }
        body { 
            margin: 0; background: var(--dark); color: var(--white); 
            font-family: 'Arial Black', sans-serif; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; height: 100vh;
            touch-action: none;
        }

        #gameContainer { 
            position: relative; width: 850px; height: 480px; 
            background: radial-gradient(circle, #1c2541 0%, #0b132b 100%);
            border: 4px solid #3a506b; border-radius: 30px; overflow: hidden;
        }

        canvas { display: block; width: 100%; height: 100%; }

        /* --- BRAWL STYLE UI --- */
        .ui-layer { position: absolute; inset: 0; z-index: 10; pointer-events: none; }
        .pointer { pointer-events: all; }

        /* Seiten-Buttons (Shop, Skins) */
        .side-bar { position: absolute; left: 20px; top: 80px; display: flex; flex-direction: column; gap: 15px; }
        .tile-btn { 
            width: 80px; height: 80px; background: var(--blue); border: 4px solid #fff; 
            border-radius: 15px; box-shadow: 0 5px 0 #0056aa; display: flex; 
            align-items: center; justify-content: center; font-size: 2rem; cursor: pointer;
        }
        .tile-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #0056aa; }

        /* Profil / Gold oben */
        .top-bar { position: absolute; top: 15px; width: 100%; padding: 0 25px; display: flex; justify-content: space-between; box-sizing: border-box; }
        .currency-box { background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px; border: 2px solid var(--yellow); color: var(--yellow); display: flex; align-items: center; gap: 10px; }

        /* Haupt-Button UNTEN RECHTS */
        .play-btn { 
            position: absolute; right: 30px; bottom: 30px; 
            width: 220px; height: 80px; background: var(--yellow); 
            border: 5px solid #fff; border-radius: 20px; box-shadow: 0 8px 0 #b38f00;
            color: #000; font-size: 2rem; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; transform: rotate(-2deg);
        }
        .play-btn:active { transform: rotate(-2deg) translateY(5px); box-shadow: 0 3px 0 #b38f00; }

        /* Mobile Controls */
        .mobile-zone { position: absolute; inset: 0; display: flex; z-index: 5; }
        .m-jump { flex: 1; } .m-dash { flex: 1; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="lobbyUI" class="ui-layer pointer">
        <div class="top-bar">
            <div class="currency-box">💰 <span id="goldCount">0</span></div>
            <div class="currency-box" style="border-color: var(--blue);">⭐ LVL <span id="lvlCount">1</span></div>
        </div>

        <div class="side-bar">
            <div class="tile-btn pointer" onclick="alert('Shop öffnet...')">🛒</div>
            <div class="tile-btn pointer" style="background: var(--green);" onclick="alert('Skin auswählen')">👕</div>
        </div>

        <div class="play-btn pointer" onclick="startGame()">SPIELEN</div>
    </div>

    <div id="gameUI" class="ui-layer hidden">
        <div class="top-bar">
            <div id="gameHP" style="font-size: 2rem; filter: drop-shadow(0 0 5px #000);">❤️❤️❤️</div>
            <div id="gameProg" style="color: var(--white);">0%</div>
        </div>
        <div class="mobile-zone pointer">
            <div class="m-jump" id="touchJump"></div>
            <div class="m-dash" id="touchDash"></div>
        </div>
    </div>

    <canvas id="canvas" width="850" height="480"></canvas>
</div>

<script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    let state = { gold: parseInt(localStorage.getItem("nb_gold")) || 0, lvl: 1 };
    let game = { active: false, frame: 0, distance: 0, speed: 6 };
    let player = { x: 150, y: 320, w: 50, h: 70, vy: 0, jumps: 0, isDashing: 0 };
    let enemies = [], platforms = [];

    // --- CHARACTER DESIGN (BRAWL STYLE) ---
    function drawHero(x, y, isLobby) {
        ctx.save();
        ctx.translate(x, y);

        if(!isLobby) { // Animation beim Laufen
            let walk = Math.sin(game.frame * 0.15) * 5;
            ctx.translate(0, walk);
        } else { // Atmen in der Lobby
            let breathe = Math.sin(Date.now() * 0.003) * 3;
            ctx.scale(1, 1 + breathe/100);
        }

        // Körper (Blaues Shirt)
        ctx.fillStyle = "#3498db";
        ctx.beginPath(); ctx.roundRect(0, 20, 50, 40, 10); ctx.fill();
        
        // Kopf
        ctx.fillStyle = "#ffdbac";
        ctx.beginPath(); ctx.roundRect(5, -10, 40, 35, 12); ctx.fill();
        
        // Haare / Mütze
        ctx.fillStyle = "#2c3e50";
        ctx.beginPath(); ctx.roundRect(5, -12, 40, 15, [10, 10, 0, 0]); ctx.fill();

        // Augen (Groß & Ausdrucksstark)
        ctx.fillStyle = "#fff";
        ctx.beginPath(); ctx.arc(15, 5, 6, 0, Math.PI*2); ctx.arc(35, 5, 6, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#000";
        ctx.beginPath(); ctx.arc(17, 5, 2.5, 0, Math.PI*2); ctx.arc(33, 5, 2.5, 0, Math.PI*2); ctx.fill();

        // Dash-Effekt
        if(player.isDashing > 0) {
            ctx.globalAlpha = 0.5;
            ctx.fillStyle = "#00fbff";
            ctx.fillRect(-20, 20, 20, 40);
            ctx.globalAlpha = 1;
        }

        ctx.restore();
    }

    function drawEnemy(x, y) {
        ctx.fillStyle = "#e74c3c";
        // Kleines Monster mit Stacheln
        ctx.beginPath(); ctx.moveTo(x, y+40); ctx.lineTo(x+20, y); ctx.lineTo(x+40, y+40); ctx.fill();
        ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(x+20, y+25, 5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(x+20, y+25, 2, 0, Math.PI*2); ctx.fill();
    }

    function startGame() {
        document.getElementById("lobbyUI").classList.add("hidden");
        document.getElementById("gameUI").classList.remove("hidden");
        game.active = true;
        game.distance = 0;
        player.hp = 3;
        enemies = [];
        platforms = [{x: 0, y: 400, w: 2000, h: 100}];
        loop();
    }

    function stopGame() {
        game.active = false;
        document.getElementById("gameUI").classList.add("hidden");
        document.getElementById("lobbyUI").classList.remove("hidden");
        localStorage.setItem("nb_gold", state.gold);
    }

    // --- STEUERUNG ---
    function jump() { if(player.jumps < 2) { player.vy = -16; player.jumps++; } }
    function dash() { if(player.isDashing <= 0) player.isDashing = 15; }

    window.addEventListener("keydown", (e) => {
        if(e.code === "Space") jump();
        if(e.code === "ShiftLeft") dash();
    });

    document.getElementById("touchJump").addEventListener("touchstart", (e) => { jump(); e.preventDefault(); });
    document.getElementById("touchDash").addEventListener("touchstart", (e) => { dash(); e.preventDefault(); });

    function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if(!game.active) {
            // Lobby Hintergrund & Charakter-Vorschau
            drawHero(400, 200, true);
            requestAnimationFrame(loop);
            return;
        }

        game.frame++;
        game.distance += game.speed;

        // Physik
        let currentSpeed = player.isDashing > 0 ? 15 : game.speed;
        if(player.isDashing > 0) { player.isDashing--; player.vy = 0; }
        else { player.vy += 0.8; player.y += player.vy; }

        if(player.y > 330) { player.y = 330; player.vy = 0; player.jumps = 0; }

        // Plattformen
        platforms.forEach(p => {
            p.x -= currentSpeed;
            ctx.fillStyle = "#34495e";
            ctx.beginPath(); ctx.roundRect(p.x, p.y, p.w, p.h, 10); ctx.fill();
        });

        // Gegner Spawning
        if(game.frame % 120 === 0) enemies.push({x: 900, y: 360});
        enemies.forEach((en, i) => {
            en.x -= currentSpeed;
            drawEnemy(en.x, en.y);
            if(Math.abs(player.x - en.x) < 40 && Math.abs(player.y - en.y) < 40) {
                if(player.isDashing > 0) { enemies.splice(i, 1); state.gold += 10; }
                else { player.hp--; enemies.splice(i, 1); if(player.hp <= 0) stopGame(); }
            }
        });

        drawHero(player.x, player.y, false);
        
        document.getElementById("goldCount").innerText = state.gold;
        document.getElementById("gameHP").innerText = "❤️".repeat(player.hp);
        
        requestAnimationFrame(loop);
    }

    // Initialer Loop Start
    loop();
</script>
</body>
</html>
