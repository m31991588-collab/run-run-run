<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nebula World - Dash & Boots</title>
    <style>
        :root { --p: #6366f1; --s: #10b981; --dark: #020617; --gold: #fbbf24; --dash: #22d3ee; }
        body { margin: 0; background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; touch-action: none; }
        #gameContainer { position: relative; width: 800px; height: 450px; border-radius: 20px; overflow: hidden; box-shadow: 0 0 60px rgba(0,0,0,0.9); border: 2px solid #1e293b; }
        canvas { display: block; background: linear-gradient(to bottom, #020617, #1e1b4b); }

        .hud { position: absolute; top: 15px; width: 100%; padding: 0 25px; box-sizing: border-box; display: flex; justify-content: space-between; pointer-events: none; z-index: 10; }
        
        /* Stamina Bar für Dash */
        .stamina-container { position: absolute; top: 50px; left: 25px; width: 120px; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
        #staminaFill { height: 100%; background: var(--dash); width: 100%; transition: 0.1s; }

        .overlay { position: absolute; inset: 0; background: rgba(2, 6, 23, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        .btn { padding: 12px 25px; background: var(--p); border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; margin: 5px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="gameContainer">
        <div class="hud hidden" id="gameHud">
            <div>💰 <span id="goldDisp">0</span></div>
            <div style="color: var(--gold);">LEVEL <span id="lvlDisp">1</span></div>
            <div id="hpDisp">❤️❤️❤️</div>
        </div>
        <div class="stamina-container hidden" id="staminaBar"><div id="staminaFill"></div></div>

        <canvas id="canvas" width="800" height="450"></canvas>

        <div id="menu" class="overlay">
            <h1 id="mTitle">NEBULA WORLD</h1>
            <p id="mSub">Nutze SPACE zum Springen & SHIFT zum Dashen!</p>
            <div id="shop" style="margin-bottom: 20px;">
                <button class="btn" style="background: var(--dash);" onclick="buyAbility('dash')">DASH KAUFEN (50 💰)</button>
                <button class="btn" style="background: var(--gold); color: black;" onclick="buyAbility('boots')">BOOTS KAUFEN (100 💰)</button>
            </div>
            <button class="btn" onclick="startLevel()">LEVEL STARTEN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        let state = { 
            gold: 0, 
            lvl: 1, 
            hasDash: false, 
            hasBoots: false 
        };

        let game = { active: false, dist: 0, frame: 0, speed: 5 };
        let player = { 
            x: 100, y: 300, w: 40, h: 50, vy: 0, 
            jumps: 0, maxJumps: 1, hp: 3, 
            dashCooldown: 0, isDashing: 0, stamina: 100 
        };

        let platforms = [], enemies = [], particles = [];

        function buyAbility(type) {
            if(type === 'dash' && state.gold >= 50) { state.gold -= 50; state.hasDash = true; alert("Dash freigeschaltet! Nutze SHIFT."); }
            if(type === 'boots' && state.gold >= 100) { state.gold -= 100; state.hasBoots = true; player.maxJumps = 2; alert("Doppelsprung aktiv!"); }
            updateHUD();
        }

        function startLevel() {
            document.getElementById("menu").classList.add("hidden");
            document.getElementById("gameHud").classList.remove("hidden");
            document.getElementById("staminaBar").classList.remove("hidden");
            game.active = true;
            game.dist = 0;
            player.hp = 3;
            player.stamina = 100;
            platforms = [{x: 0, y: 350, w: 1000, h: 100}];
            enemies = [];
            loop();
        }

        function handleDash() {
            if(!state.hasDash || player.stamina < 30 || player.dashCooldown > 0) return;
            player.isDashing = 15; // Dash dauert 15 Frames
            player.dashCooldown = 40;
            player.stamina -= 35;
            spawnParticles(player.x, player.y, "#22d3ee");
        }

        function spawnParticles(x, y, color) {
            for(let i=0; i<8; i++) {
                particles.push({x, y, vx: Math.random()*4-2, vy: Math.random()*4-2, life: 1, color});
            }
        }

        function loop() {
            if(!game.active) return;
            game.frame++;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Stamina Regeneration
            if(player.stamina < 100) player.stamina += 0.5;
            if(player.dashCooldown > 0) player.dashCooldown--;
            document.getElementById("staminaFill").style.width = player.stamina + "%";

            // PHYSIK & DASH
            let currentSpeed = game.speed;
            if(player.isDashing > 0) {
                player.isDashing--;
                player.vy = 0; // Schweben beim Dashen
                currentSpeed = 15; // Dreifache Geschwindigkeit
            } else {
                player.vy += 0.8;
                player.y += player.vy;
            }
            game.dist += currentSpeed;

            // PLATTFORMEN
            platforms.forEach((plat, i) => {
                plat.x -= currentSpeed;
                ctx.fillStyle = "#1e293b";
                ctx.beginPath(); ctx.roundRect(plat.x, plat.y, plat.w, plat.h, 5); ctx.fill();
                
                // Kollision
                if(player.x < plat.x + plat.w && player.x + 40 > plat.x && 
                   player.y + 50 > plat.y && player.y + 40 < plat.y && player.vy >= 0) {
                    player.y = plat.y - 50;
                    player.vy = 0;
                    player.jumps = 0;
                }
            });

            // GENERIERUNG
            if(game.frame % 100 === 0) {
                platforms.push({x: 850, y: 200 + Math.random()*150, w: 200, h: 20});
                if(Math.random() > 0.5) enemies.push({x: 850, y: 310});
            }

            // SPIELER ZEICHNEN
            ctx.fillStyle = player.isDashing > 0 ? "#22d3ee" : "#6366f1";
            ctx.beginPath(); ctx.roundRect(player.x, player.y, 40, 50, 8); ctx.fill();

            // GEGNER
            enemies.forEach((en, i) => {
                en.x -= currentSpeed;
                ctx.fillStyle = "#ef4444";
                ctx.beginPath(); ctx.moveTo(en.x, en.y+40); ctx.lineTo(en.x+20, en.y); ctx.lineTo(en.x+40, en.y+40); ctx.fill();
                
                if(Math.abs(player.x - en.x) < 30 && Math.abs(player.y - en.y) < 30) {
                    if(player.isDashing > 0) { // Gegner mit Dash zerstören!
                        enemies.splice(i, 1);
                        state.gold += 20;
                        spawnParticles(en.x, en.y, "#ef4444");
                    } else {
                        player.hp--; enemies.splice(i, 1);
                        if(player.hp <= 0) stopGame("GAME OVER");
                    }
                }
            });

            // PARTIKEL
            particles.forEach((p, i) => {
                p.x -= 2; p.life -= 0.02;
                ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 4, 4);
                if(p.life <= 0) particles.splice(i, 1);
            });
            ctx.globalAlpha = 1;

            if(player.y > canvas.height) stopGame("ABGESTÜRZT");
            updateHUD();
            requestAnimationFrame(loop);
        }

        function updateHUD() {
            document.getElementById("goldDisp").innerText = state.gold;
            document.getElementById("lvlDisp").innerText = state.lvl;
            document.getElementById("hpDisp").innerText = "❤️".repeat(player.hp);
        }

        function stopGame(t) {
            game.active = false;
            document.getElementById("mTitle").innerText = t;
            document.getElementById("menu").classList.remove("hidden");
        }

        window.addEventListener("keydown", (e) => {
            if(e.code === "Space" && player.jumps < player.maxJumps) {
                player.vy = -14; player.jumps++;
            }
            if(e.code === "ShiftLeft" || e.code === "ShiftRight") {
                handleDash();
            }
        });
    </script>
</body>
</html>
