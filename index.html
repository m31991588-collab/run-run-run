<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Nebula Stars: Ultimate Edition</title>
    <style>
        :root { 
            --gold: #ffdf00; --gold-dark: #d4af37;
            --btn-blue: #007bff; --btn-blue-dark: #0056b3;
            --bg-dark: #0b132b; --panel-bg: rgba(11, 19, 43, 0.85);
            --danger: #ff3366; --success: #00e676;
        }
        
        * { box-sizing: border-box; user-select: none; }
        
        body { 
            margin: 0; background: #000; color: white; 
            font-family: 'Arial Black', 'Impact', sans-serif; 
            overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh;
            touch-action: none; /* Verhindert Scrollen auf Mobile */
        }

        #gameContainer { 
            position: relative; width: 900px; height: 500px; 
            background: #000; /* Wird vom Canvas übermalt */
            border: 8px solid #1c2541; border-radius: 30px; overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.9), inset 0 0 20px rgba(255,255,255,0.1);
        }

        canvas { display: block; width: 100%; height: 100%; }

        /* --- BRAWL STYLE UI --- */
        .ui-layer { position: absolute; inset: 0; z-index: 10; pointer-events: none; display: flex; flex-direction: column; }
        .pointer { pointer-events: all; }
        .hidden { display: none !important; }

        /* Top Bar (Lobby & Game) */
        .top-bar { display: flex; justify-content: space-between; padding: 20px 30px; width: 100%; }
        .stats-group { display: flex; gap: 15px; }
        .pill { 
            background: var(--panel-bg); padding: 8px 20px; border-radius: 25px; 
            border: 3px solid rgba(255,255,255,0.8); box-shadow: 0 5px 0 rgba(0,0,0,0.5);
            font-size: 1.4rem; display: flex; align-items: center; gap: 8px; text-shadow: 1px 1px 2px #000;
        }
        .pill.gold { color: var(--gold); border-color: var(--gold); }
        .pill.level { color: var(--success); border-color: var(--success); }

        /* Start Button */
        .play-btn { 
            position: absolute; right: 30px; bottom: 30px; 
            width: 250px; height: 90px; 
            background: linear-gradient(180deg, #ffe53b 0%, #ff2525 100%); 
            border: 5px solid #fff; border-radius: 25px; box-shadow: 0 10px 0 #990000;
            color: #fff; font-size: 3rem; text-transform: uppercase; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transform: rotate(-2deg);
            text-shadow: 2px 2px 0 #000; transition: transform 0.1s;
        }
        .play-btn:active { transform: rotate(-2deg) translateY(8px); box-shadow: 0 2px 0 #990000; }

        /* Menu Buttons (Shop etc) */
        .side-menu { position: absolute; left: 30px; top: 100px; display: flex; flex-direction: column; gap: 15px; }
        .menu-btn { 
            width: 80px; height: 80px; background: linear-gradient(180deg, var(--btn-blue) 0%, var(--btn-blue-dark) 100%);
            border: 4px solid #fff; border-radius: 20px; box-shadow: 0 6px 0 #003366;
            display: flex; align-items: center; justify-content: center; font-size: 2.5rem; cursor: pointer;
        }
        .menu-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #003366; }

        /* Shop Modal */
        .modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.8); z-index: 50; display: flex; justify-content: center; align-items: center; }
        .modal { background: #1c2541; border: 6px solid #3a506b; border-radius: 30px; padding: 30px; width: 80%; max-height: 90%; overflow-y: auto; text-align: center; }
        .skin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 20px; margin-top: 20px; }
        .skin-card { 
            background: #0b132b; border: 4px solid #5bc0be; border-radius: 20px; padding: 15px;
            display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.2s;
        }
        .skin-card.locked { filter: grayscale(100%); opacity: 0.7; border-color: #555; }
        .skin-card.active { border-color: var(--gold); box-shadow: 0 0 20px var(--gold); transform: scale(1.05); }
        .buy-tag { background: var(--danger); color: white; padding: 5px 15px; border-radius: 10px; font-weight: bold; margin-top: 10px; }

        /* Mobile Controls */
        .controls { position: absolute; bottom: 20px; left: 0; right: 0; padding: 0 40px; display: flex; justify-content: space-between; align-items: flex-end; }
        .ctrl-group { display: flex; gap: 20px; }
        .c-btn { 
            width: 90px; height: 90px; border-radius: 50%; background: rgba(255,255,255,0.1); backdrop-filter: blur(8px);
            border: 4px solid rgba(255,255,255,0.5); display: flex; justify-content: center; align-items: center;
            font-size: 3rem; color: #fff; box-shadow: 0 8px 0 rgba(0,0,0,0.3);
        }
        .c-btn:active { transform: translateY(5px); box-shadow: 0 3px 0 rgba(0,0,0,0.3); background: rgba(255,255,255,0.3); }

        /* Death Screen */
        .game-over { position: absolute; inset: 0; background: rgba(255,0,0,0.2); backdrop-filter: blur(5px); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 40; }
        .go-title { font-size: 5rem; color: #fff; text-shadow: 0 5px 0 #000, 0 0 20px red; margin: 0; }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="ui-lobby" class="ui-layer pointer">
        <div class="top-bar">
            <div class="stats-group">
                <div class="pill gold">💰 <span id="lobby-gold">0</span></div>
            </div>
            <div class="pill level">⭐ LVL <span id="lobby-lvl">1</span></div>
        </div>
        <div class="side-menu">
            <div class="menu-btn" onclick="UI.openShop()">🛒</div>
        </div>
        <div class="play-btn" onclick="Game.start()">LOS!</div>
    </div>

    <div id="ui-shop" class="modal-overlay hidden pointer">
        <div class="modal">
            <h1 style="color: var(--gold); margin: 0; font-size: 2.5rem; text-shadow: 2px 2px #000;">CHARAKTER SHOP</h1>
            <div class="skin-grid" id="shop-container"></div>
            <div class="pill pointer" style="margin: 30px auto 0; width: max-content; background: var(--danger); border-color: #fff;" onclick="UI.closeShop()">SCHLIESSEN</div>
        </div>
    </div>

    <div id="ui-game" class="ui-layer hidden">
        <div class="top-bar">
            <div id="health-bar" style="font-size: 2.5rem; filter: drop-shadow(2px 4px 2px rgba(0,0,0,0.8));"></div>
            <div class="pill gold">💰 <span id="game-gold">0</span></div>
        </div>
        <div class="controls pointer">
            <div class="ctrl-group">
                <div class="c-btn" id="btn-jump" style="border-color: #00e676; color: #00e676;">↑</div>
                <div class="c-btn" id="btn-duck" style="border-color: #ff3366; color: #ff3366;">↓</div>
            </div>
            <div class="c-btn" id="btn-dash" style="border-color: #00d2ff; color: #00d2ff;">⚡</div>
        </div>
    </div>

    <div id="ui-gameover" class="game-over hidden pointer">
        <h1 class="go-title">BESIEGT!</h1>
        <p style="font-size: 1.5rem; margin-bottom: 30px;">Distanz: <span id="go-dist">0</span>m | Gold: +<span id="go-gold">0</span></p>
        <div class="play-btn" style="position: relative; right: 0; bottom: 0;" onclick="Game.returnToLobby()">LOBBY</div>
    </div>

    <canvas id="canvas" width="900" height="500"></canvas>
</div>

<script>
/** * NEBULA STARS: ULTIMATE ENGINE
 * Komplett neu geschriebene Architektur für Performance & Gameplay
 */

const cvs = document.getElementById('canvas');
const ctx = cvs.getContext('2d');

// --- DATEN & STATE ---
const Data = {
    gold: parseInt(localStorage.getItem('ns_v4_gold')) || 0,
    activeSkin: localStorage.getItem('ns_v4_skin') || 'boy',
    skins: JSON.parse(localStorage.getItem('ns_v4_unlocked')) || ['boy'],
    maxLvl: parseInt(localStorage.getItem('ns_v4_lvl')) || 1
};

const SKINS = {
    'boy':  { name: 'Brawler', icon: '👦', price: 0, c1: '#007bff', c2: '#0056b3' },
    'ninja':{ name: 'Ninja',   icon: '🥷', price: 50, c1: '#333333', c2: '#000000', detail: '#00ff88' },
    'fire': { name: 'Blaze',   icon: '🔥', price: 150, c1: '#ff5e00', c2: '#cc0000', detail: '#ffcc00' },
    'king': { name: 'King',    icon: '👑', price: 300, c1: '#ffcc00', c2: '#b38f00', detail: '#ffffff' }
};

// --- SPIEL LOGIK ---
const Game = {
    animId: null, running: false, frame: 0, speed: 5, distance: 0, level: 1, goldEarned: 0,
    
    start() {
        if(this.running) return;
        this.running = true;
        this.frame = 0; this.distance = 0; this.level = 1; this.speed = 5; this.goldEarned = 0;
        
        Player.reset();
        World.reset();
        UI.showGame();
        
        cancelAnimationFrame(this.animId);
        this.loop();
    },
    
    over() {
        this.running = false;
        Data.gold += this.goldEarned;
        if(this.level > Data.maxLvl) Data.maxLvl = this.level;
        Data.save();
        UI.showGameOver();
    },
    
    returnToLobby() {
        document.getElementById('ui-gameover').classList.add('hidden');
        UI.showLobby();
        this.drawIdle();
    },

    save() {
        localStorage.setItem('ns_v4_gold', Data.gold);
        localStorage.setItem('ns_v4_skin', Data.activeSkin);
        localStorage.setItem('ns_v4_unlocked', JSON.stringify(Data.skins));
        localStorage.setItem('ns_v4_lvl', Data.maxLvl);
    },

    loop() {
        if(!Game.running) return;
        Game.frame++;
        Game.distance += Game.speed * 0.1;
        
        // Level Progression
        if(Game.distance > Game.level * 250) {
            Game.level++;
            Game.speed += 0.5;
            World.addLevelUpText();
        }

        ctx.clearRect(0,0, cvs.width, cvs.height);
        
        World.updateAndDraw();
        Player.updateAndDraw();
        
        UI.updateHUD();
        Game.animId = requestAnimationFrame(() => Game.loop());
    },

    drawIdle() {
        ctx.clearRect(0,0, cvs.width, cvs.height);
        World.drawBackground(1);
        Player.draw(450, 250, true);
    }
};

// --- SPIELER ---
const Player = {
    x: 180, y: 300, w: 50, h: 80, vy: 0, 
    jumps: 0, ducking: false, dash: 0, hp: 3, iframes: 0,
    
    reset() { this.y = 250; this.vy = 0; this.jumps = 0; this.dash = 0; this.hp = 3; this.iframes = 0; this.ducking = false; },
    
    doJump() { if(this.jumps < 2 && this.dash <= 0) { this.vy = -16; this.jumps++; this.ducking = false; World.addDust(this.x, this.y+this.h); } },
    doDuck(state) { if(this.dash <= 0) this.ducking = state; },
    doDash() { if(this.dash <= 0) { this.dash = 20; this.vy = 0; this.ducking = false; } },
    
    takeDamage() {
        if(this.iframes > 0 || this.dash > 0) return;
        this.hp--; this.iframes = 60; // 1 Sekunde Unverwundbar
        if(this.hp <= 0) Game.over();
    },

    updateAndDraw() {
        // Physics
        if(this.dash > 0) { 
            this.dash--; this.vy = 0; 
            if(Game.frame%3===0) World.addTrail(this.x, this.y, this.h);
        } else {
            this.vy += 0.8; // Schwerkraft
            this.y += this.vy;
        }
        
        if(this.iframes > 0) this.iframes--;
        
        let py = this.ducking ? this.y + 35 : this.y;
        let ph = this.ducking ? 45 : 80;

        // Collision Check mit Plattformen (Fairere Hitbox)
        let hitPlatform = false;
        for(let p of World.platforms) {
            if(this.x + this.w - 10 > p.x && this.x + 10 < p.x + p.w && 
               this.y + ph > p.y && this.y + ph - this.vy <= p.y + 15) {
                this.y = p.y - ph; this.vy = 0; this.jumps = 0; hitPlatform = true; break;
            }
        }

        if(this.y > 600) Game.over(); // Abgrund

        this.draw(this.x, py, false, ph);
    },

    draw(x, py, isLobby, ph = 80) {
        if(this.iframes > 0 && Game.frame % 10 < 5) return; // Blink Effekt
        
        ctx.save();
        let s = SKINS[Data.activeSkin];
        let breathe = isLobby ? Math.sin(Date.now() * 0.005) * 5 : 0;
        py -= breathe;

        // Schatten
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.beginPath(); ctx.ellipse(x+25, py+ph+5, 20, 6, 0, 0, Math.PI*2); ctx.fill();

        // Dash Aura
        if(this.dash > 0) {
            ctx.shadowBlur = 20; ctx.shadowColor = "#00d2ff";
            ctx.strokeStyle = "#fff"; ctx.lineWidth = 3;
            ctx.strokeRect(x-5, py-5, this.w+10, ph+10);
            ctx.shadowBlur = 0;
        }

        // Main Body Gradient
        let grad = ctx.createLinearGradient(x, py, x, py+ph);
        grad.addColorStop(0, s.c1); grad.addColorStop(1, s.c2);
        
        ctx.fillStyle = grad;
        ctx.strokeStyle = "#0b132b"; ctx.lineWidth = 5;
        ctx.beginPath(); ctx.roundRect(x, py, this.w, ph, 12); ctx.fill(); ctx.stroke();

        // Detail (zB Ninja Stirnband)
        if(s.detail) {
            ctx.fillStyle = s.detail;
            ctx.fillRect(x, py+10, this.w, 10);
        }

        // Face
        ctx.fillStyle = "#ffdbac";
        ctx.beginPath(); ctx.roundRect(x+5, py-5, 40, 35, 8); ctx.fill();
        
        // Eyes
        ctx.fillStyle = "#fff";
        ctx.beginPath(); ctx.arc(x+15, py+12, 7, 0, Math.PI*2); ctx.arc(x+35, py+12, 7, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#000";
        let eyeLook = this.dash > 0 ? 2 : 0;
        ctx.beginPath(); ctx.arc(x+16+eyeLook, py+12, 3, 0, Math.PI*2); ctx.arc(x+36+eyeLook, py+12, 3, 0, Math.PI*2); ctx.fill();

        ctx.restore();
    }
};

// --- WELT & GENERIERUNG ---
const World = {
    platforms: [], coins: [], enemies: [], particles: [], texts: [], bgObjects: [],
    
    reset() {
        this.platforms = [{x: 0, y: 380, w: 2000, h: 200}];
        this.coins = []; this.enemies = []; this.particles = []; this.texts = []; this.bgObjects = [];
        for(let i=0; i<10; i++) this.bgObjects.push({x: Math.random()*1000, y: Math.random()*200, s: Math.random()*0.5+0.5, t: 'cloud'});
    },

    addDust(x, y) { for(let i=0; i<5; i++) this.particles.push({x: x+25, y: y, vx: (Math.random()-0.5)*4, vy: Math.random()*-2, life: 20, c: '#fff'}); },
    addTrail(x, y, h) { this.particles.push({x: x, y: y+10, w: 50, h: h-20, life: 10, trail: true}); },
    addLevelUpText() { this.texts.push({x: 450, y: 250, text: "LEVEL UP!", life: 100}); },

    updateAndDraw() {
        this.drawBackground(Game.level);
        let speed = Player.dash > 0 ? Game.speed * 2 : Game.speed;

        // Map Generator
        if(Game.frame % (Math.max(60, 120 - Game.level*10)) === 0) {
            let gap = Math.random() > 0.4;
            let py = gap ? 250 + Math.random()*50 : 380;
            this.platforms.push({x: 1000, y: py, w: 200 + Math.random()*300, h: 200});
            
            // Spawn Collectibles & Enemies
            if(Math.random() > 0.3) this.coins.push({x: 1100, y: py - 60});
            if(Math.random() > 0.5 && Game.frame > 300) this.enemies.push({x: 1200, y: py - 40});
        }

        // BG Objects
        if(Game.frame % 100 === 0) this.bgObjects.push({x: 1000, y: Math.random()*250, s: Math.random()*0.5+0.5, t: 'cloud'});
        for(let i=this.bgObjects.length-1; i>=0; i--) {
            let b = this.bgObjects[i]; b.x -= speed * 0.2;
            if(b.x < -100) { this.bgObjects.splice(i,1); continue; }
            ctx.fillStyle = `rgba(255,255,255,${0.6*b.s})`;
            ctx.beginPath(); ctx.arc(b.x, b.y, 30*b.s, 0, Math.PI*2); ctx.arc(b.x+30*b.s, b.y-10*b.s, 40*b.s, 0, Math.PI*2); ctx.arc(b.x+60*b.s, b.y, 30*b.s, 0, Math.PI*2); ctx.fill();
        }

        // Platforms (HD Vektor Look)
        for(let i=this.platforms.length-1; i>=0; i--) {
            let p = this.platforms[i]; p.x -= speed;
            if(p.x + p.w < -100) { this.platforms.splice(i,1); continue; }
            
            ctx.save();
            // Erdschichten
            ctx.fillStyle = "#3e2723"; ctx.beginPath(); ctx.roundRect(p.x, p.y+20, p.w, p.h, 15); ctx.fill();
            ctx.fillStyle = "#5d4037"; ctx.beginPath(); ctx.roundRect(p.x, p.y+10, p.w, p.h-20, 15); ctx.fill();
            // Gras
            let gColor = Game.level % 2 === 0 ? "#ff9800" : "#4caf50"; // Farbe ändert sich pro Level
            let gTop = Game.level % 2 === 0 ? "#ffb74d" : "#81c784";
            ctx.fillStyle = gColor; ctx.beginPath(); ctx.roundRect(p.x, p.y+5, p.w, 20, 10); ctx.fill();
            ctx.fillStyle = gTop;   ctx.beginPath(); ctx.roundRect(p.x, p.y, p.w, 15, [10,10,0,0]); ctx.fill();
            ctx.restore();
        }

        // Coins (Rotierend)
        for(let i=this.coins.length-1; i>=0; i--) {
            let c = this.coins[i]; c.x -= speed;
            if(c.x < -50) { this.coins.splice(i,1); continue; }
            
            let scale = Math.abs(Math.sin(Game.frame * 0.1));
            ctx.save(); ctx.translate(c.x, c.y + Math.sin(Game.frame*0.1)*5); ctx.scale(scale, 1);
            ctx.fillStyle = "#fbc02d"; ctx.beginPath(); ctx.arc(0,0, 15, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(0,0, 8, 0, Math.PI*2); ctx.fill();
            ctx.restore();

            // Sammeln (Kleine Hitbox)
            if(Math.abs((Player.x+25) - c.x) < 30 && Math.abs((Player.y+40) - c.y) < 40) {
                Game.goldEarned++; this.coins.splice(i,1);
            }
        }

        // Enemies (Stachel-Block)
        for(let i=this.enemies.length-1; i>=0; i--) {
            let e = this.enemies[i]; e.x -= speed + 1.5;
            if(e.x < -50) { this.enemies.splice(i,1); continue; }
            
            ctx.save(); ctx.translate(e.x, e.y);
            ctx.fillStyle = "#d32f2f"; ctx.beginPath(); ctx.roundRect(0,0, 40, 40, 8); ctx.fill();
            ctx.fillStyle = "#fff"; // Stacheln
            ctx.beginPath(); ctx.moveTo(20,-10); ctx.lineTo(10,0); ctx.lineTo(30,0); ctx.fill();
            // Böses Gesicht
            ctx.fillStyle = "#000"; ctx.fillRect(10,10, 6,6); ctx.fillRect(24,10, 6,6);
            ctx.restore();

            // Hit Detection (Dash zerstört Gegner)
            if(Player.x + Player.w > e.x && Player.x < e.x + 40 && Player.y + (Player.ducking?45:80) > e.y && Player.y < e.y + 40) {
                if(Player.dash > 0) {
                    this.enemies.splice(i,1);
                    for(let j=0; j<10; j++) this.particles.push({x: e.x, y: e.y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 20, c: '#d32f2f'});
                } else {
                    Player.takeDamage();
                }
            }
        }

        // Partikel System
        for(let i=this.particles.length-1; i>=0; i--) {
            let p = this.particles[i]; p.life--;
            if(p.life <= 0) { this.particles.splice(i,1); continue; }
            
            if(p.trail) {
                p.x -= speed;
                ctx.fillStyle = `rgba(0, 210, 255, ${p.life/20})`;
                ctx.beginPath(); ctx.roundRect(p.x, p.y, p.w, p.h, 10); ctx.fill();
            } else {
                p.x += p.vx - speed; p.y += p.vy;
                ctx.fillStyle = p.c; ctx.globalAlpha = p.life/20;
                ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        // Floating Texts
        for(let i=this.texts.length-1; i>=0; i--) {
            let t = this.texts[i]; t.life--; t.y -= 1;
            if(t.life <= 0) { this.texts.splice(i,1); continue; }
            ctx.fillStyle = `rgba(255, 255, 255, ${t.life/100})`;
            ctx.font = "bold 40px 'Arial Black'"; ctx.textAlign = "center";
            ctx.fillText(t.text, t.x, t.y); ctx.strokeText(t.text, t.x, t.y);
        }
    },

    drawBackground(lvl) {
        let grad = ctx.createLinearGradient(0,0,0,cvs.height);
        if(lvl % 3 === 1) { grad.addColorStop(0, '#00b4db'); grad.addColorStop(1, '#0083b0'); } // Tag
        else if(lvl % 3 === 2) { grad.addColorStop(0, '#ff7e5f'); grad.addColorStop(1, '#feb47b'); } // Sunset
        else { grad.addColorStop(0, '#0f2027'); grad.addColorStop(1, '#203a43'); } // Nacht
        
        ctx.fillStyle = grad;
        ctx.fillRect(0,0, cvs.width, cvs.height);

        // Berge (Parallax)
        ctx.fillStyle = "rgba(0,0,0,0.1)";
        ctx.beginPath(); ctx.moveTo(0,500); ctx.lineTo(300, 250); ctx.lineTo(600, 500); ctx.fill();
        ctx.beginPath(); ctx.moveTo(400,500); ctx.lineTo(700, 200); ctx.lineTo(1000, 500); ctx.fill();
    }
};

// --- USER INTERFACE & INPUTS ---
const UI = {
    showLobby() {
        document.getElementById('ui-lobby').classList.remove('hidden');
        document.getElementById('ui-game').classList.add('hidden');
        document.getElementById('lobby-gold').innerText = Data.gold;
        document.getElementById('lobby-lvl').innerText = Data.maxLvl;
    },
    
    showGame() {
        document.getElementById('ui-lobby').classList.add('hidden');
        document.getElementById('ui-game').classList.remove('hidden');
    },

    showGameOver() {
        document.getElementById('ui-gameover').classList.remove('hidden');
        document.getElementById('ui-game').classList.add('hidden');
        document.getElementById('go-dist').innerText = Math.floor(Game.distance);
        document.getElementById('go-gold').innerText = Game.goldEarned;
    },

    updateHUD() {
        document.getElementById('health-bar').innerText = "❤️".repeat(Player.hp);
        document.getElementById('game-gold').innerText = Game.goldEarned;
    },

    openShop() {
        document.getElementById('ui-shop').classList.remove('hidden');
        this.renderShop();
    },
    closeShop() { document.getElementById('ui-shop').classList.add('hidden'); },

    renderShop() {
        const c = document.getElementById('shop-container');
        c.innerHTML = '';
        for(let id in SKINS) {
            let s = SKINS[id];
            let owned = Data.skins.includes(id);
            let active = Data.activeSkin === id;
            
            c.innerHTML += `
                <div class="skin-card ${owned ? '' : 'locked'} ${active ? 'active' : ''}" onclick="UI.buyOrEquip('${id}', ${s.price})">
                    <div style="font-size: 3.5rem;">${s.icon}</div>
                    <div style="font-size: 1.2rem; color: #fff; margin: 10px 0;">${s.name}</div>
                    ${owned ? (active ? '<span style="color:var(--gold);font-weight:bold;">AKTIV</span>' : '<span style="color:#aaa;">IM BESITZ</span>') 
                            : `<div class="buy-tag">${s.price} 💰</div>`}
                </div>
            `;
        }
    },

    buyOrEquip(id, price) {
        if(Data.skins.includes(id)) {
            Data.activeSkin = id; Data.save(); this.renderShop(); Game.drawIdle();
        } else if(Data.gold >= price) {
            Data.gold -= price; Data.skins.push(id); Data.activeSkin = id;
            Data.save(); document.getElementById('lobby-gold').innerText = Data.gold; this.renderShop(); Game.drawIdle();
        } else { alert("Nicht genug Gold! Spiele, um mehr zu sammeln."); }
    }
};

// --- EVENTS ---
window.addEventListener('keydown', e => {
    if(e.code === 'Space' || e.code === 'ArrowUp') Player.doJump();
    if(e.code === 'ArrowDown') Player.doDuck(true);
});
window.addEventListener('keyup', e => {
    if(e.code === 'ArrowDown') Player.doDuck(false);
});

// Mobile Controls
document.getElementById('btn-jump').addEventListener('touchstart', e => { e.preventDefault(); Player.doJump(); });
document.getElementById('btn-duck').addEventListener('touchstart', e => { e.preventDefault(); Player.doDuck(true); });
document.getElementById('btn-duck').addEventListener('touchend', e => { e.preventDefault(); Player.doDuck(false); });
document.getElementById('btn-dash').addEventListener('touchstart', e => { e.preventDefault(); Player.doDash(); });

// Init
Data.save = Game.save;
UI.showLobby();
Game.drawIdle();

</script>
</body>
</html>
