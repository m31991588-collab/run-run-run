<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Nebula Stars: Evolution</title>
    <style>
        :root { 
            --blue: #0081ff; --yellow: #ffca00; --red: #ff4646; 
            --dark: #0b132b; --glass: rgba(255, 255, 255, 0.15);
        }
        body { 
            margin: 0; background: var(--dark); color: #fff; 
            font-family: 'Arial Black', sans-serif; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; height: 100vh;
            touch-action: none;
        }

        #gameContainer { 
            position: relative; width: 850px; height: 480px; 
            background: radial-gradient(circle, #1c2541 0%, #0b132b 100%);
            border: 4px solid #3a506b; border-radius: 30px; overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        canvas { display: block; width: 100%; height: 100%; }

        /* --- UI LAYERS --- */
        .ui-layer { position: absolute; inset: 0; z-index: 10; pointer-events: none; }
        .pointer { pointer-events: all; }

        /* Lobby Top Bar */
        .top-bar { 
            position: absolute; top: 15px; width: 100%; padding: 0 25px; 
            display: flex; justify-content: space-between; box-sizing: border-box; 
        }
        .stat-box { 
            background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 20px; 
            border: 2px solid var(--yellow); color: var(--yellow); display: flex; align-items: center; gap: 8px;
        }

        /* Lobby Buttons */
        .side-menu { position: absolute; left: 20px; top: 100px; display: flex; flex-direction: column; gap: 15px; }
        .icon-btn { 
            width: 75px; height: 75px; background: var(--blue); border: 4px solid #fff; 
            border-radius: 18px; box-shadow: 0 6px 0 #0056aa; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 2.2rem;
        }
        .icon-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #0056aa; }

        .play-btn { 
            position: absolute; right: 30px; bottom: 30px; 
            width: 220px; height: 80px; background: var(--yellow); 
            border: 5px solid #fff; border-radius: 20px; box-shadow: 0 8px 0 #b38f00;
            color: #000; font-size: 2rem; cursor: pointer; display: flex; 
            align-items: center; justify-content: center; transform: rotate(-2deg);
        }

        /* Shop / Modals */
        .modal { 
            position: absolute; inset: 40px; background: rgba(11, 19, 43, 0.98); 
            border: 4px solid var(--blue); border-radius: 25px; padding: 30px; 
            display: flex; flex-direction: column; align-items: center; z-index: 100;
        }
        .skin-grid { display: flex; gap: 20px; margin-top: 20px; }
        .skin-card { 
            width: 140px; height: 180px; background: #1c2541; border: 3px solid #fff; 
            border-radius: 20px; cursor: pointer; padding: 15px; text-align: center;
        }
        .skin-card.active { border-color: var(--yellow); background: #2c3e50; }

        /* --- MOBILE CONTROLS (Glas-Optik) --- */
        .mobile-controls { 
            position: absolute; bottom: 30px; width: 100%; 
            display: flex; justify-content: space-between; padding: 0 40px; box-sizing: border-box; 
        }
        .m-btn { 
            width: 85px; height: 85px; background: var(--glass); backdrop-filter: blur(8px);
            border: 3px solid rgba(255,255,255,0.3); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 2.5rem;
            pointer-events: all; user-select: none;
        }
        .m-btn:active { background: rgba(255,255,255,0.4); transform: scale(0.9); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="lobbyUI" class="ui-layer pointer">
        <div class="top-bar">
            <div class="stat-box">💰 <span id="goldLobby">0</span></div>
            <div class="stat-box" style="border-color: var(--blue);">⭐ LVL <span id="lvlLobby">1</span></div>
        </div>
        <div class="side-menu">
            <div class="icon-btn" onclick="openModal('shopModal')">🛒</div>
            <div class="icon-btn" style="background: #2ecc71; box-shadow: 0 6px 0 #27ae60;" onclick="openModal('skinModal')">👕</div>
        </div>
        <div class="play-btn" onclick="startGame()">SPIELEN</div>
    </div>

    <div id="shopModal" class="ui-layer hidden pointer">
        <div class="modal">
            <h2>SHOP</h2>
            <div class="skin-grid">
                <div class="skin-card" onclick="buySkin('Fire', 50)">
                    <div style="font-size: 3.5rem;">🔥</div>
                    <p>FIRE HERO</p>
                    <button style="background:var(--yellow); border:none; border-radius:5px; padding:5px;">50 💰</button>
                </div>
                <div class="skin-card" onclick="buySkin('Neon', 150)">
                    <div style="font-size: 3.5rem;">⚡</div>
                    <p>NEON NINJA</p>
                    <button style="background:var(--yellow); border:none; border-radius:5px; padding:5px;">150 💰</button>
                </div>
            </div>
            <button class="icon-btn" style="margin-top:40px; width:150px; height:50px; font-size:1rem;" onclick="closeModals()">ZURÜCK</button>
        </div>
    </div>

    <div id="gameUI" class="ui-layer hidden">
        <div class="top-bar">
            <div id="hpDisp" style="font-size: 2rem;">❤️❤️❤️</div>
            <div id="goldGame">💰 0</div>
        </div>
        <div class="mobile-controls">
            <div style="display: flex; gap: 20px;">
                <div class="m-btn pointer" id="jumpBtn" style="background: rgba(0, 129, 255, 0.4);">↑</div>
                <div class="m-btn pointer" id="duckBtn" style="background: rgba(255, 70, 70, 0.4);">↓</div>
            </div>
            <div class="m-btn pointer" id="dashBtn" style="background: rgba(34, 211, 238, 0.4);">⚡</div>
        </div>
    </div>

    <canvas id="canvas" width="850" height="480"></canvas>
</div>

<script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    // --- GAME STATE ---
    let state = {
        gold: parseInt(localStorage.getItem("ns_gold")) || 0,
        lvl: 1,
        ownedSkins: ['Default'],
        activeSkin: 'Default'
    };

    let game = { active: false, frame: 0, speed: 6, bossMode: false };
    let player = { x: 120, y: 330, w: 50, h: 75, vy: 0, jumps: 0, hp: 3, isDucking: false, isDashing: 0 };
    let objects = { platforms: [], enemies: [], obstacles: [] };

    // --- UI FUNCTIONS ---
    function openModal(id) { document.getElementById(id).classList.remove("hidden"); }
    function closeModals() { document.querySelectorAll('.ui-layer').forEach(l => { if(l.id !== 'lobbyUI' && l.id !== 'gameUI') l.classList.add("hidden"); }); }
    
    function buySkin(name, price) {
        if(state.gold >= price && !state.ownedSkins.includes(name)) {
            state.gold -= price;
            state.ownedSkins.push(name);
            state.activeSkin = name;
            save(); alert("Gekauft & Ausgerüstet!");
        } else if(state.ownedSkins.includes(name)) {
            state.activeSkin = name;
            alert("Skin gewechselt!");
        } else { alert("Zu wenig Gold!"); }
    }

    function save() {
        localStorage.setItem("ns_gold", state.gold);
        document.getElementById("goldLobby").innerText = state.gold;
        document.getElementById("lvlLobby").innerText = state.lvl;
    }

    // --- GAME ENGINE ---
    function startGame() {
        document.getElementById("lobbyUI").classList.add("hidden");
        document.getElementById("gameUI").classList.remove("hidden");
        game.active = true; game.frame = 0; game.bossMode = false;
        player.hp = 3; player.y = 330;
        objects.platforms = [{x: 0, y: 410, w: 1200, h: 100}];
        objects.enemies = []; objects.obstacles = [];
        loop();
    }

    function jump() { if(player.jumps < 2) { player.vy = -16; player.jumps++; player.isDucking = false; } }
    function dash() { if(player.isDashing <= 0) player.isDashing = 15; }

    // Steuerung (PC)
    window.addEventListener("keydown", (e) => {
        if(e.code === "Space") jump();
        if(e.code === "ArrowDown") player.isDucking = true;
        if(e.code === "ShiftLeft") dash();
    });
    window.addEventListener("keyup", (e) => { if(e.code === "ArrowDown") player.isDucking = false; });

    // Steuerung (Mobile Buttons)
    document.getElementById("jumpBtn").addEventListener("touchstart", (e) => { e.preventDefault(); jump(); });
    document.getElementById("duckBtn").addEventListener("touchstart", (e) => { e.preventDefault(); player.isDucking = true; });
    document.getElementById("duckBtn").addEventListener("touchend", (e) => { e.preventDefault(); player.isDucking = false; });
    document.getElementById("dashBtn").addEventListener("touchstart", (e) => { e.preventDefault(); dash(); });

    function drawHero(x, y) {
        ctx.save();
        let h = player.isDucking ? 45 : 75;
        let py = player.isDucking ? y + 30 : y;
        
        // Shadow
        ctx.fillStyle = "rgba(0,0,0,0.2)";
        ctx.beginPath(); ctx.ellipse(x+25, 410, 20, 5, 0, 0, Math.PI*2); ctx.fill();

        // Skin Colors
        ctx.fillStyle = state.activeSkin === 'Fire' ? "#e67e22" : (state.activeSkin === 'Neon' ? "#00fbff" : "#3498db");
        ctx.beginPath(); ctx.roundRect(x, py, 50, h, 12); ctx.fill();
        
        // Eyes
        ctx.fillStyle = "#fff";
        ctx.beginPath(); ctx.arc(x+15, py+20, 6, 0, Math.PI*2); ctx.arc(x+35, py+20, 6, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#000";
        ctx.beginPath(); ctx.arc(x+17, py+20, 2.5, 0, Math.PI*2); ctx.arc(x+33, py+20, 2.5, 0, Math.PI*2); ctx.fill();
        
        if(player.isDashing > 0) {
            ctx.strokeStyle = "#00fbff"; ctx.lineWidth = 4; ctx.strokeRect(x-5, py-5, 60, h+10);
        }
        ctx.restore();
    }

    function loop() {
        if(!game.active) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawHero(400, 200); // Preview in Lobby
            requestAnimationFrame(loop);
            return;
        }

        game.frame++;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Scroll & Speed
        let speed = player.isDashing > 0 ? 16 : game.speed;
        if(player.isDashing > 0) { player.isDashing--; player.vy = 0; }
        else { player.vy += 0.8; player.y += player.vy; }

        // Plattformen & Löcher
        objects.platforms.forEach((p, i) => {
            p.x -= speed;
            ctx.fillStyle = "#34495e"; ctx.beginPath(); ctx.roundRect(p.x, p.y, p.w, p.h, 10); ctx.fill();
            if(player.x < p.x + p.w && player.x + 50 > p.x && player.y + 75 > p.y && player.y + 65 < p.y) {
                player.y = p.y - 75; player.vy = 0; player.jumps = 0;
            }
        });

        // Spawn Logic
        if(game.frame % 100 === 0) {
            let type = Math.random();
            if(type > 0.4) objects.platforms.push({x: 900, y: Math.random() > 0.5 ? 410 : 280, w: 300, h: 40});
            if(type < 0.3) objects.enemies.push({x: 900, y: 370, vx: -4 - Math.random()*4});
            if(type < 0.2) objects.obstacles.push({x: 900, y: 310, w: 80, h: 15}); // Duck-Hindernis
        }

        // Hindernisse (Ducken erforderlich)
        objects.obstacles.forEach((ob, i) => {
            ob.x -= speed;
            ctx.fillStyle = "#95a5a6"; ctx.fillRect(ob.x, ob.y, ob.w, ob.h);
            if(player.x < ob.x + ob.w && player.x + 50 > ob.x && player.y < ob.y + ob.h && player.y + 75 > ob.y) {
                if(!player.isDucking) { player.hp--; objects.obstacles.splice(i, 1); }
            }
        });

        // Gegner (Bewegen sich)
        objects.enemies.forEach((en, i) => {
            en.x += (en.vx - speed/2);
            ctx.fillStyle = "#ff4646"; ctx.beginPath(); ctx.moveTo(en.x, en.y+40); ctx.lineTo(en.x+20, en.y); ctx.lineTo(en.x+40, en.y+40); ctx.fill();
            if(Math.abs(player.x - en.x) < 40 && Math.abs(player.y - en.y) < 40) {
                if(player.isDashing > 0) { enemies.splice(i, 1); state.gold += 10; }
                else { player.hp--; objects.enemies.splice(i, 1); }
            }
        });

        drawHero(player.x, player.y);

        // UI Update
        document.getElementById("hpDisp").innerText = "❤️".repeat(player.hp);
        document.getElementById("goldGame").innerText = "💰 " + Math.floor(game.frame/10);

        if(player.y > canvas.height || player.hp <= 0) {
            state.gold += Math.floor(game.frame/10);
            game.active = false; save();
            document.getElementById("gameUI").classList.add("hidden");
            document.getElementById("lobbyUI").classList.remove("hidden");
        }

        requestAnimationFrame(loop);
    }

    save();
    loop();
</script>
</body>
</html>
